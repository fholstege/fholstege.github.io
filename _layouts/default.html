<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default:
      "Floris Holstege" }}
    </title>
    <meta
      name="description"
      content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}"
    />
    <link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    {% if page.use_math or page.collection == 'writing' %}
      {% include mathjax.html %}
    {% endif %}
  </head>
  <body class="page-body{% if page.layout == 'post' %} post-page{% endif %}">
    <div class="site-frame">
      <header class="topbar">
        <nav aria-label="Primary">
          <ul class="top-nav">
            <li><a href="{{ '/' | relative_url }}#about">About</a></li>
            <li><a href="{{ '/' | relative_url }}#research">Research</a></li>
            <li><a href="{{ '/' | relative_url }}#policy">Policy</a></li>
            <li><a href="{{ '/' | relative_url }}#teaching">Teaching</a></li>
            <li><a href="{{ '/writing/' | relative_url }}">Writing</a></li>
          </ul>
        </nav>
      </header>

      <main class="writing-page">
        {{ content }}
      </main>
    </div>
  </body>
</html>
